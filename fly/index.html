<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GẮN GÍCH BAY NHẢY</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url(fly.webp) center/cover no-repeat;
}

.wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 460px;
}

.card {
    width: 100%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 32px;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    text-align: center;
}

.logo-img {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

h1 {
    margin-bottom: 12px;
    color: #111;
    font-size: 28px;
}

p {
    color: #555;
    margin-bottom: 24px;
    line-height: 1.6;
    font-size: 15px;
}

.count {
    font-size: 64px;
    font-weight: bold;
    color: #2563eb;
    margin: 20px 0;
}

.card--green .count {
    color: #16a34a;
}

button {
    width: 100%;
    background: #2563eb;
    color: white;
    border: none;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.card--green button {
    background: #16a34a;
}

button:hover {
    transform: translateY(-2px);
    opacity: 0.95;
}

.note {
    margin-top: 20px;
    font-size: 14px;
    color: #777;
}

@media (max-width: 768px) {
    .card {
        padding: 24px;
        border-radius: 20px;
    }

    h1 {
        font-size: 24px;
    }

    .count {
        font-size: 52px;
    }

    button {
        padding: 14px;
        font-size: 15px;
    }
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- Card 1: Số lần bay -->
    <div class="card">
        <img
            class="logo-img"
            src="/fly/fly.webp"
            alt="Music Counter"
        >

        <h1>Số lần bay</h1>

        <p>
            Mỗi lần bấm nút sẽ tăng số đếm<br>
        </p>

        <div class="count" id="counter-bay">0</div>

        <button id="actionBtn-bay">
            Bay
        </button>

        <div class="note" id="currentTime">
            Đang tải thời gian...
        </div>

        <div class="note">
            Tự động reset vào 00:00 Thứ 2 hàng tuần
        </div>
    </div>

    <!-- Card 2: Vào hội -->
    <div class="card card--green">
        <img
            class="logo-img"
            src="/fly/fly.webp"
            alt="Vào hội Counter"
        >

        <h1>Vào hội</h1>

        <p>
            Mỗi lần bấm nút sẽ tăng số đếm<br>
        </p>

        <div class="count" id="counter-hoi">0</div>

        <button id="actionBtn-hoi">
            Vào hội
        </button>

        <div class="note">
            Tự động reset vào 00:00 Thứ 2 hàng tuần
        </div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    increment
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBSyK4N22BpisoxGhY4blm7a4esYWgaVHw",
    authDomain: "music-cf53c.firebaseapp.com",
    projectId: "music-cf53c",
    storageBucket: "music-cf53c.firebasestorage.app",
    messagingSenderId: "257693769172",
    appId: "1:257693769172:web:2fe9d768a9380e2f2a0a41",
    measurementId: "G-SFYW6XKFJ3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const timeEl = document.getElementById("currentTime");

// Refs
const bayCounterEl = document.getElementById("counter-bay");
const bayBtn = document.getElementById("actionBtn-bay");
const bayRef = doc(db, "system", "counter"); // giữ nguyên doc cũ

const hoiCounterEl = document.getElementById("counter-hoi");
const hoiBtn = document.getElementById("actionBtn-hoi");
const hoiRef = doc(db, "system", "counter_hoi"); // doc mới cho "vào hội"

function updateCurrentTime() {
    const now = new Date();
    const formatted = now.toLocaleString("vi-VN", {
        weekday: "long",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });
    timeEl.innerText = formatted;
}

async function checkWeeklyReset(ref) {
    try {
        const snapshot = await getDoc(ref);
        const now = new Date();

        const isMondayMidnight =
            now.getDay() === 1 &&
            now.getHours() === 0;

        if (!snapshot.exists()) {
            await setDoc(ref, {
                total: 0,
                lastResetDate: now.toDateString()
            });
            return;
        }

        const data = snapshot.data();
        const lastResetDate = data.lastResetDate || "";

        if (isMondayMidnight && lastResetDate !== now.toDateString()) {
            await setDoc(ref, {
                total: 0,
                lastResetDate: now.toDateString()
            });
        }
    } catch (error) {
        console.error("Lỗi reset tuần:", error);
    }
}

async function loadCounter(ref, el) {
    try {
        const snapshot = await getDoc(ref);

        if (!snapshot.exists()) {
            await setDoc(ref, { total: 0 });
            el.innerText = 0;
            return;
        }

        el.innerText = snapshot.data().total || 0;
    } catch (error) {
        console.error("Lỗi load counter:", error);
    }
}

async function increaseCounter(ref, el) {
    try {
        let current = parseInt(el.innerText) || 0;
        current += 1;
        el.innerText = current;

        const snapshot = await getDoc(ref);

        if (!snapshot.exists()) {
            await setDoc(ref, { total: current });
            return;
        }

        await updateDoc(ref, {
            total: increment(1)
        });
    } catch (error) {
        console.error("Lỗi tăng counter:", error);
    }
}

// Event listeners
bayBtn.addEventListener("click", () => increaseCounter(bayRef, bayCounterEl));
hoiBtn.addEventListener("click", () => increaseCounter(hoiRef, hoiCounterEl));

// Init
updateCurrentTime();
setInterval(updateCurrentTime, 1000);

checkWeeklyReset(bayRef).then(() => loadCounter(bayRef, bayCounterEl));
checkWeeklyReset(hoiRef).then(() => loadCounter(hoiRef, hoiCounterEl));

</script>

</body>
</html>
