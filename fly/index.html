<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GẮN GÍCH BAY NHẢY</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url(fly.webp) center/cover no-repeat;
}

.wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 460px;
}

.card {
    width: 100%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 32px;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    text-align: center;
}

.logo-img {
    width: 90px; height: 90px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

h1 { margin-bottom: 12px; color: #111; font-size: 28px; }
p  { color: #555; margin-bottom: 24px; line-height: 1.6; font-size: 15px; }

.count {
    font-size: 64px;
    font-weight: bold;
    color: #2563eb;
    margin: 20px 0;
    transition: transform 0.1s ease;
}
.count.bump { transform: scale(1.15); }
.card--green .count { color: #16a34a; }

button {
    width: 100%;
    background: #2563eb;
    color: white;
    border: none;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}
.card--green button { background: #16a34a; }
button:active { transform: scale(0.97); opacity: 0.9; }

.note { margin-top: 20px; font-size: 14px; color: #777; }

/* History */
.history-wrap { margin-top: 24px; text-align: left; }

.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    font-weight: 700;
    color: #444;
}

.btn-clear {
    width: auto;
    background: none;
    color: #aaa;
    font-size: 12px;
    font-weight: 400;
    padding: 2px 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
}
.btn-clear:hover { color: #dc2626; border-color: #dc2626; transform: none; opacity: 1; }

.history-list {
    max-height: 175px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    -webkit-overflow-scrolling: touch;
}
.history-list::-webkit-scrollbar { width: 3px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

.history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f8f9fb;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    border-left: 3px solid #2563eb;
    flex-shrink: 0;
    animation: slideIn 0.2s ease;
}
.card--green .history-item { border-left-color: #16a34a; }

@keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}

.hi-time { color: #777; }
.hi-val  { font-weight: 700; color: #2563eb; }
.card--green .hi-val { color: #16a34a; }

.history-empty { text-align: center; color: #bbb; font-size: 13px; padding: 14px 0; }

.scroll-hint { text-align: center; font-size: 11px; color: #bbb; margin-top: 4px; display: none; }
.scroll-hint.show { display: block; }

@media (max-width: 768px) {
    .card { padding: 24px; border-radius: 20px; }
    h1 { font-size: 24px; }
    .count { font-size: 52px; }
    button { padding: 14px; font-size: 15px; }
}
</style>
</head>
<body>

<div class="wrapper">

    <div class="card">
        <img class="logo-img" src="/fly/fly.webp" alt="Music Counter">
        <h1>Số lần bay</h1>
        <p>Mỗi lần bấm nút sẽ tăng số đếm</p>
        <div class="count" id="counter-bay">0</div>
        <button id="actionBtn-bay">Bay</button>
        <div class="note" id="currentTime">Đang tải thời gian...</div>
        <div class="note">Tự động reset vào 00:00 Thứ 2 hàng tuần</div>
        <div class="history-wrap">
            <div class="history-header">
                Lịch sử
                <button class="btn-clear" onclick="clearHistory('bay')">Xoá</button>
            </div>
            <div class="history-list" id="history-bay">
                <div class="history-empty">Chưa có lịch sử</div>
            </div>
            <div class="scroll-hint" id="hint-bay">↕ Vuốt để xem thêm</div>
        </div>
    </div>

    <div class="card card--green">
        <img class="logo-img" src="/fly/fly.webp" alt="Vào hội Counter">
        <h1>Vào hội</h1>
        <p>Mỗi lần bấm nút sẽ tăng số đếm</p>
        <div class="count" id="counter-hoi">0</div>
        <button id="actionBtn-hoi">Vào hội</button>
        <div class="note">Tự động reset vào 00:00 Thứ 2 hàng tuần</div>
        <div class="history-wrap">
            <div class="history-header">
                Lịch sử
                <button class="btn-clear" onclick="clearHistory('hoi')">Xoá</button>
            </div>
            <div class="history-list" id="history-hoi">
                <div class="history-empty">Chưa có lịch sử</div>
            </div>
            <div class="scroll-hint" id="hint-hoi">↕ Vuốt để xem thêm</div>
        </div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
    getFirestore,
    doc, getDoc, setDoc, updateDoc, increment,
    collection, addDoc, getDocs, orderBy, query, limit,
    writeBatch, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBSyK4N22BpisoxGhY4blm7a4esYWgaVHw",
    authDomain: "music-cf53c.firebaseapp.com",
    projectId: "music-cf53c",
    storageBucket: "music-cf53c.firebasestorage.app",
    messagingSenderId: "257693769172",
    appId: "1:257693769172:web:2fe9d768a9380e2f2a0a41",
    measurementId: "G-SFYW6XKFJ3"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const bayRef  = doc(db, "system", "counter");
const hoiRef  = doc(db, "system", "counter_hoi");
const bayLogs = collection(db, "logs_bay");
const hoiLogs = collection(db, "logs_hoi");

// State local — không cần getDoc mỗi lần bấm
const state = { bay: 0, hoi: 0 };

// Thời gian
function updateCurrentTime() {
    document.getElementById("currentTime").innerText =
        new Date().toLocaleString("vi-VN", {
            weekday: "long", year: "numeric",
            month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit", second: "2-digit"
        });
}
updateCurrentTime();
setInterval(updateCurrentTime, 1000);

// Thêm 1 dòng lịch sử lên đầu (không reload toàn bộ)
function prependHistory(key, total) {
    const el   = document.getElementById("history-" + key);
    const hint = document.getElementById("hint-" + key);

    // Xoá empty nếu có
    const empty = el.querySelector(".history-empty");
    if (empty) empty.remove();

    const time = new Date().toLocaleString("vi-VN", {
        month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", second: "2-digit"
    });

    const item = document.createElement("div");
    item.className = "history-item";
    item.innerHTML = `<span class="hi-time">${time}</span><span class="hi-val">+1 → ${total}</span>`;
    el.insertBefore(item, el.firstChild);

    // Giữ tối đa 50 dòng trong DOM
    while (el.children.length > 50) el.removeChild(el.lastChild);

    hint.classList.toggle("show", el.children.length > 5);
}

// Load lịch sử lần đầu
function renderHistory(key, docs) {
    const el   = document.getElementById("history-" + key);
    const hint = document.getElementById("hint-" + key);
    if (!docs.length) {
        el.innerHTML = '<div class="history-empty">Chưa có lịch sử</div>';
        hint.classList.remove("show");
        return;
    }
    el.innerHTML = docs.map(d => {
        const { total, timestamp } = d.data();
        const time = timestamp
            ? timestamp.toDate().toLocaleString("vi-VN", {
                month: "2-digit", day: "2-digit",
                hour: "2-digit", minute: "2-digit", second: "2-digit"
              })
            : "—";
        return `<div class="history-item">
            <span class="hi-time">${time}</span>
            <span class="hi-val">+1 → ${total}</span>
        </div>`;
    }).join("");
    hint.classList.toggle("show", docs.length > 5);
}

async function loadHistory(key, logsRef) {
    const snap = await getDocs(query(logsRef, orderBy("timestamp", "desc"), limit(50)));
    renderHistory(key, snap.docs);
}

// Xoá lịch sử
window.clearHistory = async function(key) {
    if (!confirm("Xoá lịch sử?")) return;
    const logsRef = key === "bay" ? bayLogs : hoiLogs;
    const snap  = await getDocs(query(logsRef, limit(500)));
    const batch = writeBatch(db);
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    renderHistory(key, []);
};

// Reset tuần
async function checkWeeklyReset(ref) {
    const snapshot = await getDoc(ref);
    const now = new Date();
    const isMondayMidnight = now.getDay() === 1 && now.getHours() === 0;
    if (!snapshot.exists()) {
        await setDoc(ref, { total: 0, lastResetDate: now.toDateString() });
        return;
    }
    const { lastResetDate } = snapshot.data();
    if (isMondayMidnight && lastResetDate !== now.toDateString()) {
        await setDoc(ref, { total: 0, lastResetDate: now.toDateString() });
    }
}

// Load ban đầu
async function loadCounter(ref, logsRef, key, el) {
    try {
        await checkWeeklyReset(ref);
        const snapshot = await getDoc(ref);
        state[key] = snapshot.exists() ? (snapshot.data().total || 0) : 0;
        el.innerText = state[key];
        await loadHistory(key, logsRef);
    } catch (e) {
        console.error("Lỗi load:", e);
    }
}

// Bump animation
function bump(el) {
    el.classList.remove("bump");
    void el.offsetWidth; // reflow
    el.classList.add("bump");
    setTimeout(() => el.classList.remove("bump"), 150);
}

// Tăng — UI ngay lập tức, Firebase chạy nền
function increaseCounter(ref, logsRef, key, el) {
    // Cập nhật state & UI ngay
    state[key] += 1;
    const newTotal = state[key];
    el.innerText = newTotal;
    bump(el);

    // Thêm dòng lịch sử ngay (dùng giờ local, chưa chờ server)
    prependHistory(key, newTotal);

    // Sync Firebase nền — không chặn UI
    Promise.all([
        updateDoc(ref, { total: increment(1) }).catch(() =>
            setDoc(ref, { total: newTotal, lastResetDate: new Date().toDateString() })
        ),
        addDoc(logsRef, { total: newTotal, timestamp: serverTimestamp() })
    ]).catch(e => console.error("Lỗi sync Firebase:", e));
}

// Wiring
const bayEl = document.getElementById("counter-bay");
const hoiEl = document.getElementById("counter-hoi");

document.getElementById("actionBtn-bay").addEventListener("click", () => increaseCounter(bayRef, bayLogs, "bay", bayEl));
document.getElementById("actionBtn-hoi").addEventListener("click", () => increaseCounter(hoiRef, hoiLogs, "hoi", hoiEl));

loadCounter(bayRef, bayLogs, "bay", bayEl);
loadCounter(hoiRef, hoiLogs, "hoi", hoiEl);

</script>

</body>
</html>
