<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thành viên – Hội Gắn Gích</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="member.css" />

    <style>
      body {
        background: #1a120b url("../img/img2.jpg") center/cover;
        color: #e8d5a3;
        font-family: "Palatino Linotype", serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      .wrapper {
        max-width: 1200px;
        margin: 40px auto;
        padding: 20px;
        background: rgba(30, 20, 10, 0.85);
        border: 8px solid #4a3c2a;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
        position: relative;
      }

      h1 {
        font-family: "Creepster", "Palatino", serif;
        font-size: 4.5rem;
        text-align: center;
        color: #f4d03f;
        text-shadow:
          4px 4px 0 #000,
          -2px -2px 0 #000;
        margin: 20px 0 40px;
        letter-spacing: 4px;
      }

      .back-btn {
        display: inline-block;
        padding: 10px 20px;
        background: #2c2118;
        color: #f4d03f;
        border: 4px solid #5c4633;
        text-decoration: none;
        font-size: 1.2rem;
        box-shadow: 0 6px 0 #000;
        transition: all 0.2s;
      }

      .back-btn:hover {
        transform: translateY(-3px) scale(1.05);
        border-color: #f4d03f;
      }

      .character-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 18px;
        justify-content: center;
        margin: 30px 0;
      }

      .character-portrait {
        width: 110px;
        height: 130px;
        background: #2c2118;
        border: 6px solid #5c4633;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 8px 0 #000;
      }

      .character-portrait:hover {
        transform: scale(1.12) rotate(2deg);
        border-color: #f4d03f;
      }

      .character-portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .selected {
        border-color: #f4d03f !important;
        box-shadow: 0 0 25px #f4d03f;
      }

      /* ✅ OVERLAY nền mờ */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 998;
        display: none;
      }

      /* ✅ BIG PORTRAIT CENTER */
      .big-portrait {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        width: 280px;
        border: 12px solid #3c2a1f;
        background: #111;
        box-shadow: 10px 10px 0 #000;
        z-index: 999;
        opacity: 0;
        transition: all 0.3s ease;
      }

      .big-portrait.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .big-portrait img {
        width: 100%;
      }

      .character-name {
        font-size: 2.5rem;
        text-align: center;
        color: #f4d03f;
        margin: 10px 0;
      }

      .perks {
        padding: 0 20px;
      }

      .perks li {
        list-style: none;
        margin: 6px 0;
      }

      .perks li:before {
        content: "• ";
        color: #f4d03f;
      }

      /* ================= MOBILE RESPONSIVE ================= */
      @media (max-width: 768px) {
        .wrapper {
          margin: 10px;
          padding: 12px;
          border-width: 5px;
        }

        h1 {
          font-size: 2.2rem;
          letter-spacing: 2px;
          margin-bottom: 20px;
        }

        .back-btn {
          font-size: 1rem;
          padding: 8px 14px;
        }

        /* grid gọn lại */
        .character-grid {
          grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
          gap: 12px;
        }

        .character-portrait {
          width: 80px;
          height: 95px;
          border-width: 4px;
        }

        /* popup nhỏ lại + không tràn màn */
        .big-portrait {
          width: 90%;
          max-width: 320px;
          padding-bottom: 10px;
        }

        .character-name {
          font-size: 1.6rem;
          letter-spacing: 1px;
        }

        .perks {
          font-size: 0.95rem;
          padding: 0 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <h1>🐍 HỘI GẮN GÍCH 🐍</h1>

      <div style="text-align: center; margin-bottom: 20px">
        <a href="../index.html" class="back-btn">⬅ Quay về trang chủ</a>
      </div>

      <div style="text-align: center; margin-bottom: 30px">
        <span style="font-size: 2.2rem; color: #c9a96e">
          Character Select
        </span>
      </div>

      <div id="character-grid" class="character-grid"></div>
    </div>

    <!-- ✅ overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- ✅ popup giữa màn hình -->
    <div id="big-portrait-container" class="big-portrait">
      <img id="big-portrait-img" src="" />
      <div id="char-name" class="character-name"></div>
      <ul id="perks-list" class="perks"></ul>
    </div>

    <script src="member.js" defer></script>

    <!-- ✅ JS điều khiển popup -->
    <script>
      const overlay = document.getElementById("overlay");
      const big = document.getElementById("big-portrait-container");

      // hiện popup
      function showPopup() {
        overlay.style.display = "block";
        big.style.display = "block";
        setTimeout(() => big.classList.add("show"), 10);
      }

      // ẩn popup
      function hidePopup() {
        big.classList.remove("show");
        setTimeout(() => {
          overlay.style.display = "none";
          big.style.display = "none";
        }, 300);
      }

      overlay.onclick = hidePopup;
    </script>
  </body>
</html>
