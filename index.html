
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Danh sách cây 🌱</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        .card {
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            transition: 0.2s;
        }

        .card.true {
            border-left: 5px solid #0f0;
        }

        .card.false {
            border-left: 5px solid red;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .answer {
            margin-top: 5px;
        }

        .true .answer {
            color: #0f0;
        }

        .false .answer {
            color: red;
        }
    </style>
</head>
<body>

<h1>🌱 Danh sách cây</h1>

<input type="text" id="search" placeholder="Tìm cây hoặc tên người...">

<div id="data"></div>

<script>
const API = "https://opensheet.elk.sh/1xT9xqRBkRddx9uPv9gNE0WR0M8TcXw14-vtzGQlszrc/1";

let allData = [];

// Lấy tên người có TRUE
function getName(item) {
    return Object.keys(item)
        .filter(key => item[key] === "TRUE" && key !== "XU HOA")
        .join(", ");
}

// Render danh sách
function render(data) {
    const container = document.getElementById("data");
    container.innerHTML = "";

    data.forEach(item => {
        const tree = item["XU HOA"];
        if (!tree) return;

        const name = getName(item);
        const hasUser = name !== "";

        const div = document.createElement("div");
        div.className = "card " + (hasUser ? "true" : "false");

        div.innerHTML = `
            <div class="name">${tree}</div>
            <div class="answer">
                ${hasUser ? "👤 " + name : "❌ Chưa có người"}
            </div>
        `;

        container.appendChild(div);
    });
}

// Load data từ API
function loadData() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            allData = data;
            render(data);
        })
        .catch(err => {
            console.error("Lỗi load data:", err);
        });
}

// Search
document.getElementById("search").addEventListener("input", function() {
    const keyword = this.value.toLowerCase();

    const filtered = allData.filter(item => {
        const tree = item["XU HOA"] || "";
        const name = getName(item);

        return (
            tree.toLowerCase().includes(keyword) ||
            (name && name.toLowerCase().includes(keyword))
        );
    });

    render(filtered);
});

// Load lần đầu
loadData();

// Auto reload mỗi 10s
setInterval(loadData, 10000);
</script>

</body>
</html>
