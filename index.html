<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Vườn hoe hoe hoe</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: Arial, sans-serif;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url("img/img1.jpg");
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            padding: 20px 16px 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: darkseagreen;
            font-size: clamp(20px, 5vw, 28px);
            margin: 0 0 20px;
            letter-spacing: 1px;
        }

        .search-wrap {
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 10px 0 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55) 80%, transparent);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            font-size: 17px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            outline: none;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.55);
        }

        input[type="text"]:focus {
            background: rgba(255,255,255,0.22);
            border-color: rgba(255,255,255,0.4);
        }

        #hint {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            margin: 16px 0 0;
        }

        #data {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: rgba(20, 20, 20, 0.82);
            padding: 14px 16px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-left: 5px solid transparent;
        }

        .card.has-user {
            border-left-color: #4cff72;
        }

        .card.no-user {
            border-left-color: #ff4444;
        }

        .name {
            font-size: 17px;
            font-weight: bold;
            line-height: 1.3;
        }

        .answer {
            margin-top: 6px;
            font-size: 15px;
            line-height: 1.4;
        }

        .has-user .answer {
            color: #4cff72;
        }

        .no-user .answer {
            color: #ff6b6b;
        }

        .count {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 16px;
        }

        .loading {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 20px 0;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>🐍 HỘI GẮN GÍCH 🐍</h1>

    <div class="search-wrap">
        <input type="text" id="search" placeholder="Tìm cây hoặc tên người..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <p id="hint">Nhập ít nhất 2 ký tự để tìm kiếm</p>
    <div id="data"></div>
</div>

<script>
const API = "https://opensheet.elk.sh/1xT9xqRBkRddx9uPv9gNE0WR0M8TcXw14-vtzGQlszrc/1";

let allData = [];
let hasLoaded = false;

function getName(item) {
    return Object.keys(item)
        .filter(key => item[key] === "TRUE" && key !== "Hoa")
        .join(", ");
}

function render(data) {
    const container = document.getElementById("data");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = '<p class="loading">Không tìm thấy kết quả nào.</p>';
        return;
    }

    const frag = document.createDocumentFragment();

    data.forEach(item => {
        const tree = item["Hoa"];
        if (!tree) return;

        const name = getName(item);
        const hasUser = name !== "";

        const div = document.createElement("div");
        div.className = "card " + (hasUser ? "has-user" : "no-user");
        div.innerHTML = `
            <div class="name">${tree}</div>
            <div class="answer">${hasUser ? "👤 " + name : "❌ Chưa có người"}</div>
        `;
        frag.appendChild(div);
    });

    container.appendChild(frag);

    const count = document.createElement("p");
    count.className = "count";
    count.textContent = `${data.length} kết quả`;
    container.appendChild(count);
}

async function loadData() {
    try {
        const res = await fetch(API);
        allData = await res.json();
    } catch (err) {
        document.getElementById("data").innerHTML = '<p class="loading">Lỗi tải dữ liệu. Vui lòng thử lại.</p>';
        console.error(err);
    }
}

let debounceTimer;

document.getElementById("search").addEventListener("input", function () {
    clearTimeout(debounceTimer);
    const keyword = this.value.toLowerCase().trim();

    if (keyword.length < 2) {
        document.getElementById("data").innerHTML = "";
        document.getElementById("hint").style.display = "";
        return;
    }

    document.getElementById("hint").style.display = "none";

    debounceTimer = setTimeout(async () => {
        if (!hasLoaded) {
            document.getElementById("data").innerHTML = '<p class="loading">Đang tải dữ liệu...</p>';
            await loadData();
            hasLoaded = true;
        }

        const filtered = allData.filter(item => {
            const tree = (item["Hoa"] || "").toLowerCase();
            const name = getName(item).toLowerCase();
            return tree.includes(keyword) || name.includes(keyword);
        });

        render(filtered);
    }, 250);
});
</script>

</body>
</html>
