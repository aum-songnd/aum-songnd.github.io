<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vườn hoe hoe hoe </title>
    <style>
        body {
            font-family: Arial;
            color: #fff;
            padding: 20px;

            background-image: url("https://instagram.fhan17-1.fna.fbcdn.net/v/t51.82787-15/659777526_17866376778666442_7759283153971995326_n.webp?_nc_cat=110&ig_cache_key=Mzg2OTk4NTMxNzQzMzA5NzQ2Nw%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4MTQ0MC5zZHIuQzMifQ%3D%3D&_nc_ohc=6TEfh3UfYGQQ7kNvwGyaIKz&_nc_oc=AdrN6UuefFyy_6V1hUHdN3S9cvxgWUaC3gQBa4urWa-Nnkhb-4vyn5OD3Zgwgzqby-A&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=instagram.fhan17-1.fna&_nc_gid=Q9wVH6PjTzxWWcxYqGsLXg&_nc_ss=7a32e&oh=00_Af2iHEfdrn4_mKEorE7tU7-1pL6q1eKgqH4yRx0EA9myHA&oe=69DE600C");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* overlay tối */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        .card {
            background: rgba(34,34,34,0.85);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }

        .card.true {
            border-left: 5px solid #0f0;
        }

        .card.false {
            border-left: 5px solid red;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
        }

        .answer {
            margin-top: 5px;
        }

        .true .answer {
            color: #0f0;
        }

        .false .answer {
            color: red;
        }
    </style>
</head>
<body>

<h1 style="color: darkseagreen;">🐍 HỘI GẮN GÍCH 🐍</h1>

<input type="text" id="search" placeholder="Tìm cây hoặc tên người...">

<div id="data"></div>

<script>
const API = "https://opensheet.elk.sh/1xT9xqRBkRddx9uPv9gNE0WR0M8TcXw14-vtzGQlszrc/1";

let allData = [];
let hasLoaded = false;

// Lấy tên người có TRUE
function getName(item) {
    return Object.keys(item)
        .filter(key => item[key] === "TRUE" && key !== "XU HOA")
        .join(", ");
}

// Render danh sách
function render(data) {
    const container = document.getElementById("data");
    container.innerHTML = "";

    data.forEach(item => {
        const tree = item["XU HOA"];
        if (!tree) return;

        const name = getName(item);
        const hasUser = name !== "";

        const div = document.createElement("div");
        div.className = "card " + (hasUser ? "true" : "false");

        div.innerHTML = `
            <div class="name">${tree}</div>
            <div class="answer">
                ${hasUser ? "👤 " + name : "❌ Chưa có người"}
            </div>
        `;

        container.appendChild(div);
    });
}

// Load data từ API
function loadData() {
    return fetch(API)
        .then(res => res.json())
        .then(data => {
            allData = data;
        })
        .catch(err => {
            console.error("Lỗi load data:", err);
        });
}

// Search
document.getElementById("search").addEventListener("input", async function() {
    const keyword = this.value.toLowerCase().trim();

    // Nếu chưa load thì load lần đầu
    if (!hasLoaded) {
        await loadData();
        hasLoaded = true;
    }

    // Nếu nhập < 2 ký tự → không hiển thị
    if (keyword.length < 2) {
        document.getElementById("data").innerHTML = "";
        return;
    }

    const filtered = allData.filter(item => {
        const tree = item["XU HOA"] || "";
        const name = getName(item);

        return (
            tree.toLowerCase().includes(keyword) ||
            (name && name.toLowerCase().includes(keyword))
        );
    });

    render(filtered);
});
</script>

</body>
</html>
