<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Vườn hoe hoe hoe 🐍</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1 class="title" tabindex="0">
        <span class="snake left">🐍</span>
        <span class="text">HỘI GẮN GÍCH</span>
        <span class="snake right">🐍</span>
      </h1>

      <nav class="menu">
        <a href="index.html" class="menu-item active">🌿 Vườn cây</a>
        <a href="member/index.html" class="menu-item">👥 Thành viên</a>
      </nav>

      <div class="search-wrap">
        <input
          type="text"
          id="search"
          placeholder="Tìm cây hoặc tên người..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>

      <p id="hint">Nhập ít nhất 2 ký tự để tìm kiếm</p>
      <div id="data"></div>
    </div>

    <div class="music-btn" id="musicBtn" onclick="toggleMusic()">
      <span id="musicIcon">♪</span>
    </div>

    <audio id="bgMusic" loop>
      <source src="audio/lofi3.mp3" type="audio/mpeg" />
    </audio>

    <script>
      const audio = document.getElementById("bgMusic");
      const icon = document.getElementById("musicIcon");
      const musicBtn = document.getElementById("musicBtn");

      function toggleMusic() {
        if (audio.paused) {
          playMusic();
        } else {
          pauseMusic();
        }
      }

      function playMusic() {
        audio
          .play()
          .then(() => {
            icon.textContent = "♪";
            musicBtn.classList.add("playing");
            localStorage.setItem("musicPlaying", "true");
          })
          .catch(() => {});
      }

      function pauseMusic() {
        audio.pause();
        icon.textContent = "▶";
        musicBtn.classList.remove("playing");
        localStorage.setItem("musicPlaying", "false");
      }

      function saveCurrentTime() {
        if (!audio.paused) {
          localStorage.setItem(
            "musicCurrentTime",
            audio.currentTime.toString(),
          );
        }
      }

      function initMusic() {
        const savedTime =
          parseFloat(localStorage.getItem("musicCurrentTime")) || 0;
        const shouldPlay = localStorage.getItem("musicPlaying") !== "false";

        audio.currentTime = savedTime;

        if (shouldPlay) {
          audio
            .play()
            .then(() => {
              icon.textContent = "♪";
              musicBtn.classList.add("playing");
            })
            .catch(() => {
              icon.textContent = "▶";
              musicBtn.classList.remove("playing");
            });
        } else {
          icon.textContent = "▶";
          musicBtn.classList.remove("playing");
        }
      }

      setInterval(saveCurrentTime, 1000);
      window.addEventListener("beforeunload", saveCurrentTime);

      window.addEventListener("load", () => {
        initMusic();

        document.addEventListener(
          "click",
          () => {
            if (
              audio.paused &&
              localStorage.getItem("musicPlaying") !== "false"
            ) {
              playMusic();
            }
          },
          { once: true },
        );
      });
    </script>
    <script src="js/main.js"></script>
  </body>
</html>
