<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐺 Ma Sói Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0d1526;--card:#111d35;--border:#1e3050;
  --text:#c8d8f0;--muted:#4a6080;--accent:#4f8ef7;
  --wolf:#c0392b;--seer:#8e44ad;--guard:#2471a3;--witch:#1a7a5e;
  --gold:#c9963a;--danger:#922b21;--success:#1d6a40;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,#0a1f4020,transparent),radial-gradient(ellipse 60% 40% at 80% 100%,#1a060820,transparent);pointer-events:none;z-index:0}

h1,h2,.role-name,.phase-text{font-family:'Cinzel',serif}

.wrapper{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;max-width:1200px;margin:0 auto}

/* ── HEADER ── */
.header{display:flex;align-items:center;gap:14px;padding:14px 20px;background:rgba(13,21,38,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
.header h1{font-size:20px;letter-spacing:.08em;color:#e8d5a0}
.header h1 span{color:var(--wolf)}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#1a2a4a;border:1px solid var(--border);color:var(--muted);font-family:'Cinzel',serif;letter-spacing:.06em}
.badge.active{background:#1a3020;border-color:#2a5030;color:#6dd89a}
.room-id{margin-left:auto;font-size:12px;color:var(--muted);letter-spacing:.1em}
.room-id span{color:var(--accent);font-weight:600}

/* ── LOBBY ── */
#lobby-view{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;gap:0;padding:24px}
.lobby-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:460px;display:flex;flex-direction:column;gap:20px}
.lobby-card h2{font-size:24px;color:#e8d5a0;letter-spacing:.05em;text-align:center}
.lobby-card p{font-size:14px;color:var(--muted);text-align:center;line-height:1.6}
.sep{height:1px;background:var(--border);margin:4px 0}

.inp{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:#0a1020;color:var(--text);font-size:14px;font-family:'Crimson Pro',serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}

.btn{padding:10px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;font-family:'Crimson Pro',serif;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.btn:hover{background:var(--card)}
.btn.primary{background:#1a3060;border-color:var(--accent);color:#8ac4ff}
.btn.primary:hover{background:#1e3d7a}
.btn.danger{background:#3a0f0f;border-color:var(--wolf);color:#f08080}
.btn.danger:hover{background:#4a1515}
.btn.success{background:#0f2a1a;border-color:#2d7a4a;color:#7dd8a0}
.btn.success:hover{background:#163520}
.btn.gold{background:#2a1f08;border-color:var(--gold);color:#f0c060}
.btn.wolf-btn{background:#2a0a0a;border-color:var(--wolf);color:#f08080}
.btn.seer-btn{background:#1a0a2a;border-color:var(--seer);color:#c0a0f0}
.btn.guard-btn{background:#0a1a2a;border-color:var(--guard);color:#80b8f0}
.btn.witch-btn{background:#051a14;border-color:var(--witch);color:#80d8b8}
.btn.gold-btn{background:#1a1000;border-color:var(--gold);color:#f0c060}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}

/* ── PLAYER LIST LOBBY ── */
.lobby-players{display:flex;flex-direction:column;gap:6px}
.lobby-player{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:#0a1020;border:1px solid var(--border);font-size:14px}
.ready-dot{width:8px;height:8px;border-radius:50%;background:#334155;flex-shrink:0;transition:background .3s}
.ready-dot.yes{background:#22c55e;box-shadow:0 0 6px #22c55e80}
.host-badge{margin-left:auto;font-size:10px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:.05em}
.ready-badge{margin-left:auto;font-size:10px;color:#22c55e;font-family:'Cinzel',serif}

/* ── ROLE CONFIG ── */
.role-toggle{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:#0a1020;border:1px solid var(--border);font-size:13px}
.role-toggle-desc{font-size:11px;color:var(--muted);margin-top:2px}
.toggle-sw{width:38px;height:22px;border-radius:11px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:#22c55e}
.toggle-sw.off{background:#1e293b}

/* ── GAME ── */
#game-view{display:none;flex:1;flex-direction:column}
.phase-bar{display:flex;align-items:center;gap:12px;padding:10px 18px;background:rgba(13,21,38,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);position:sticky;top:57px;z-index:40}
.phase-text{font-size:13px;letter-spacing:.06em}
.phase-text.night{color:#a0b8e8}
.phase-text.day{color:#e8c060}
.phase-info{font-size:12px;color:var(--muted)}
.alive-count{margin-left:auto;font-size:12px;color:var(--muted)}

.main{display:flex;flex:1;min-height:0}
.sidebar{width:220px;border-right:1px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:14px;background:rgba(8,12,20,.6);overflow-y:auto;flex-shrink:0}
.content{flex:1;display:flex;flex-direction:column;min-width:0}

.section-label{font-size:10px;color:var(--muted);font-family:'Cinzel',serif;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.role-card{padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card)}
.role-name{font-size:15px;font-weight:600;color:#e8d5a0;margin-bottom:4px;letter-spacing:.04em}
.role-desc{font-size:12px;color:var(--muted);line-height:1.55}

.player-list{display:flex;flex-direction:column;gap:4px}
.player-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;border:1px solid transparent;font-size:13px;transition:border-color .2s}
.player-item.me{border-color:var(--accent)}
.player-item.dead{opacity:.3;text-decoration:line-through}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.alive{background:#22c55e}
.dot.dead{background:#334155}
.dot.wolf{background:var(--wolf);box-shadow:0 0 4px var(--wolf)60}
.dot.seer{background:#a855f7;box-shadow:0 0 4px #a855f760}
.dot.guard{background:#3b82f6}
.dot.witch{background:#10b981}
.dot.hunter{background:#f97316}
.dot.cupid{background:#ec4899}
.dot.villager{background:#22c55e}
.dot.whitewolf{background:#e2e8f0;border:1px solid var(--border)}
.dot.flutist{background:var(--gold)}
.dot.halfwolf{background:#78716c}
.dot.thief{background:#78909c}
.player-role-tag{margin-left:auto;font-size:10px;color:var(--muted)}

/* CHAT */
.chat-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:5px;min-height:200px}
.msg{padding:7px 13px;border-radius:8px;font-size:13.5px;max-width:90%;line-height:1.45}
.msg.system{background:rgba(30,48,80,.5);color:#607898;align-self:center;text-align:center;font-size:12px;border:1px solid #1a2a40;max-width:100%;border-radius:6px;font-style:italic}
.msg.system.important{color:#c8a060;border-color:#3a2a10;background:rgba(40,28,8,.5)}
.msg.me{background:#152548;color:#90c0f0;align-self:flex-end;border:1px solid #1e3568}
.msg.other{background:var(--card);align-self:flex-start;border:1px solid var(--border)}
.msg-name{font-size:10px;opacity:.6;margin-bottom:2px;font-family:'Cinzel',serif;letter-spacing:.04em}
.chat-input-bar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:rgba(8,12,20,.8)}
.chat-input-bar input{flex:1}

/* ACTIONS */
.actions-area{padding:12px 14px;border-top:1px solid var(--border);background:rgba(6,10,18,.8);min-height:80px}
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:8px}
.action-grid .btn{font-size:12px;padding:9px 10px;text-align:center}

/* NIGHT LOG */
.night-log-item{font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border);line-height:1.5}

/* WIN OVERLAY */
.win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.win-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px;text-align:center;max-width:360px;width:92%}
.win-title{font-size:28px;font-family:'Cinzel',serif;color:#e8d5a0;margin-bottom:8px;letter-spacing:.06em}
.win-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.win-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)}
.win-row .tag{font-size:11px;color:var(--muted)}

/* COUNTDOWN */
.countdown-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(8px)}
.countdown-num{font-size:96px;font-family:'Cinzel',serif;color:#e8d5a0;text-shadow:0 0 40px #c9963a80;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.countdown-label{font-size:16px;color:var(--muted);letter-spacing:.1em;font-family:'Cinzel',serif}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--text);opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:600px){
  .sidebar{width:160px;font-size:12px}
  .lobby-card{padding:24px 18px}
  .action-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:440px){
  .main{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:180px}
}
</style>
</head>
<body>
<div class="wrapper">

<!-- HEADER -->
<div class="header">
  <h1>🐺 Ma <span>Sói</span> Online</h1>
  <span class="badge" id="header-badge">Sảnh chờ</span>
  <span class="room-id" id="room-id-display" style="display:none">Phòng: <span id="room-id-text"></span></span>
</div>

<!-- LOBBY -->
<div id="lobby-view">
<div class="lobby-card">
  <h2>🌙 Ma Sói Trực Tuyến</h2>
  <p>Chơi cùng bạn bè theo thời gian thực qua Firebase. Tạo phòng hoặc nhập mã để tham gia.</p>
  <div class="sep"></div>

  <div>
    <div class="section-label">Tên của bạn</div>
    <input class="inp" id="inp-name" placeholder="Nhập tên người chơi..." maxlength="16"/>
  </div>

  <div class="btn-row">
    <button class="btn primary" onclick="createRoom()">➕ Tạo phòng</button>
    <button class="btn" onclick="showJoinInput()">🔗 Vào phòng</button>
  </div>

  <div id="join-input-wrap" style="display:none">
    <input class="inp" id="inp-room-id" placeholder="Nhập mã phòng (5 ký tự)..." maxlength="5" style="text-transform:uppercase"/>
    <button class="btn primary" style="width:100%;margin-top:8px" onclick="joinRoom()">Tham gia</button>
  </div>
</div>

<!-- WAITING ROOM (shown after join) -->
<div id="waiting-card" style="display:none" class="lobby-card">
  <h2 id="room-title">Phòng ...</h2>
  <div id="waiting-status" style="font-size:13px;color:var(--muted);text-align:center"></div>

  <div>
    <div class="section-label">Người chơi</div>
    <div class="lobby-players" id="lobby-player-list"></div>
  </div>

  <div id="role-config-wrap" style="display:none">
    <div class="section-label">Vai đặc biệt (host cấu hình)</div>
    <div id="role-toggles"></div>
  </div>

  <div class="btn-row">
    <button class="btn success" id="ready-btn" onclick="toggleReady()">✅ Ready</button>
    <button class="btn primary" id="start-btn" onclick="startGame()" style="display:none">▶ Bắt đầu</button>
  </div>
  <div id="setup-msg" style="font-size:12px;color:var(--muted);text-align:center"></div>
</div>
</div>

<!-- GAME VIEW -->
<div id="game-view">
  <div class="phase-bar">
    <span class="phase-text" id="phase-text">–</span>
    <span class="phase-info" id="phase-info"></span>
    <span class="alive-count" id="alive-count"></span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div>
        <div class="section-label">Vai của bạn</div>
        <div class="role-card">
          <div class="role-name" id="my-role-name">–</div>
          <div class="role-desc" id="my-role-desc"></div>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto">
        <div class="section-label">Người chơi</div>
        <div class="player-list" id="player-list"></div>
      </div>
      <div id="night-log-section" style="display:none">
        <div class="section-label">Nhật ký đêm</div>
        <div id="night-log"></div>
      </div>
    </div>
    <div class="content">
      <div class="chat-area" id="chat-area"></div>
      <div class="chat-input-bar">
        <input class="inp" id="chat-msg" placeholder="Nhập tin nhắn..." onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="btn primary" onclick="sendChat()">Gửi</button>
      </div>
      <div class="actions-area">
        <div class="section-label" id="actions-label">Hành động</div>
        <div class="action-grid" id="action-btns"></div>
      </div>
    </div>
  </div>
</div>

<!-- COUNTDOWN OVERLAY -->
<div class="countdown-overlay" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">5</div>
  <div class="countdown-label">Ván chơi bắt đầu...</div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="win-overlay">
  <div class="win-card">
    <div class="win-title" id="win-title">–</div>
    <div class="win-sub" id="win-sub"></div>
    <div id="win-roles" style="margin-bottom:20px;max-height:240px;overflow-y:auto"></div>
    <button class="btn primary" style="width:100%;padding:11px" onclick="resetGame()">🔄 Chơi lại</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toast-wrap"></div>

</div><!-- wrapper -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ────────────────────────────────────────────────
//  FIREBASE CONFIG — thay bằng config của bạn
// ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  authDomain: "masoi-XXXXX.firebaseapp.com",
  projectId: "masoi-XXXXX",
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ────────────────────────────────────────────────
//  ROLES DATA
// ────────────────────────────────────────────────
const ROLES = {
  villager:  { name:'Dân làng',       team:'village', desc:'Tìm và treo cổ sói ban ngày.',                              color:'villager'  },
  seer:      { name:'Tiên tri',        team:'village', desc:'Mỗi đêm soi danh tính thật của 1 người.',                 color:'seer'      },
  guard:     { name:'Bảo vệ',          team:'village', desc:'Mỗi đêm bảo vệ 1 người khỏi sói (không tự bảo vệ 2 đêm liên tiếp).', color:'guard' },
  witch:     { name:'Phù thủy',        team:'village', desc:'1 bình cứu + 1 bình độc, mỗi bình dùng 1 lần/ván.',       color:'witch'     },
  hunter:    { name:'Thợ săn',         team:'village', desc:'Khi chết được bắn chết thêm 1 người.',                    color:'hunter'    },
  cupid:     { name:'Thần tình yêu',   team:'village', desc:'Đêm đầu ghép 2 người yêu. Nếu 1 chết người kia cũng chết.', color:'cupid'  },
  wolf:      { name:'Ma sói',          team:'wolf',    desc:'Ban đêm cùng phe chọn giết 1 người dân.',                  color:'wolf'      },
  whitewolf: { name:'Sói trắng',       team:'wolf3',   desc:'Thức cùng sói. Cứ 2 đêm giết 1 sói thường. Thắng khi là sói duy nhất.', color:'whitewolf' },
  halfwolf:  { name:'Nửa sói',         team:'village', desc:'Nếu bị sói cắn thì không chết mà trở thành sói.',          color:'halfwolf'  },
  flutist:   { name:'Thổi sáo',        team:'flutist', desc:'Mỗi đêm thôi miên 2 người. Thắng khi tất cả bị thôi miên.', color:'flutist'  },
  thief:     { name:'Ăn trộm',         team:'?',       desc:'Đêm đầu chọn 1 trong 2 lá bài ẩn làm vai của mình.',       color:'thief'     }
};

const SPECIAL_ROLES = ['seer','guard','witch','hunter','cupid','whitewolf','halfwolf','flutist','thief'];
const NIGHT_ORDER   = ['cupid','thief','wolf','whitewolf','seer','guard','witch','flutist'];

// ────────────────────────────────────────────────
//  STATE
// ────────────────────────────────────────────────
let myName    = '';
let myRoom    = '';
let unsubscribe = null;
let lastPhase = '';
let lastNight = 0;
let selectedRoles = { seer:true, guard:false, witch:false, hunter:false, cupid:false, whitewolf:false, halfwolf:false, flutist:false, thief:false };

// local cache of latest snapshot
let D = null;

// ────────────────────────────────────────────────
//  UTILS
// ────────────────────────────────────────────────
function rand(){ return Math.random().toString(36).substring(2,7).toUpperCase(); }
function ref(id){ return doc(db,'rooms', id || myRoom); }

function toast(txt, duration=3000){
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = txt;
  wrap.appendChild(t);
  requestAnimationFrame(()=>{ t.classList.add('show'); });
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 400); }, duration);
}

function sysMsg(text, important=false){
  if(!D) return;
  const msgs = D.messages || [];
  msgs.push({ system:true, text, important, ts: Date.now() });
  if(msgs.length > 120) msgs.splice(0, msgs.length-120);
  return updateDoc(ref(), { messages: msgs });
}

function countWolves(n){
  if(n <= 9)  return 2;
  if(n <= 13) return 3;
  return 4;
}

// ────────────────────────────────────────────────
//  LOBBY
// ────────────────────────────────────────────────
window.showJoinInput = () => {
  document.getElementById('join-input-wrap').style.display = 'block';
  document.getElementById('inp-room-id').focus();
};

window.createRoom = async () => {
  const n = document.getElementById('inp-name').value.trim();
  if(!n){ toast('Nhập tên trước!'); return; }
  myName = n;
  const id = rand();

  const initState = emptyRoomState(id, n);
  await setDoc(ref(id), initState);
  myRoom = id;
  subscribeRoom();
  showWaiting();
};

window.joinRoom = async () => {
  const n = document.getElementById('inp-name').value.trim();
  const id = document.getElementById('inp-room-id').value.trim().toUpperCase();
  if(!n){ toast('Nhập tên trước!'); return; }
  if(!id){ toast('Nhập mã phòng!'); return; }
  myName = n;
  myRoom = id;

  const snap = await getDoc(ref(id));
  if(!snap.exists()){ toast('Không tìm thấy phòng!'); return; }
  const d = snap.data();
  if(d.phase !== 'waiting'){ toast('Ván chơi đã bắt đầu!'); return; }
  if(!d.players.includes(n)){
    await updateDoc(ref(id),{ players: arrayUnion(n) });
  }
  subscribeRoom();
  showWaiting();
};

function emptyRoomState(id, host){
  return {
    id, host,
    players: [host],
    roles: {}, alive: [], dead: [],
    phase: 'waiting',
    night: 0,
    messages: [],
    votes: {},
    nightActions: {},   // { wolf_kill, guard, witch_save, witch_kill, seer_target, flutist:[...], cupid:[...], thief_choice, whitewolf_kill }
    nightKill: null,
    guardTarget: null,
    lastGuardTarget: null,
    witchSaveUsed: false,
    witchKillUsed: false,
    loverPairs: [],
    enchanted: [],
    nightLog: [],
    nightQueue: [],
    nightStep: 0,

// ────────────────────────────────────────────────
//  SUBSCRIBE (realtime listener)
// ────────────────────────────────────────────────
function subscribeRoom(){
  if(unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(ref(), snap => {
    if(!snap.exists()) return;
    D = snap.data();
    handleSnapshot(D);
  });
}

async function handleSnapshot(d){
  renderLobby(d);

  // Countdown sequence
  if(d.countdown !== null && d.countdown > 0){
    showCountdown(d.countdown);
    if(d.host === myName){
      setTimeout(async()=>{
        const s = await getDoc(ref());
        const dd = s.data();
        await updateDoc(ref(),{ countdown: dd.countdown - 1 });
      }, 1000);
    }
    return;
  }
  if(d.countdown === 0 && d.host === myName){
    hideCountdown();
    await doAssignRoles(d);
    return;
  }
  hideCountdown();

  if(d.phase !== 'waiting'){
    showGameView(d);
    renderGame(d);

    // Phase change notifications
    if(d.phase !== lastPhase || d.night !== lastNight){
      if(d.phase === 'night' && d.night > lastNight){
        toast('🌙 Đêm ' + d.night + ' bắt đầu');
      } else if(d.phase === 'day' && lastPhase === 'night'){
        toast('☀️ Bình minh ló dạng');
      }
      lastPhase = d.phase;
      lastNight = d.night;
    }

    // Win state
    if(d.winState){
      showWin(d.winState, d);
    }

    // Host processes night queue
    if(d.phase === 'night' && d.host === myName){
      await processNightAsHost(d);
    }
    // Host processes day vote
    if(d.phase === 'day' && d.host === myName){
      await processDayAsHost(d);
    }
  }
}

// ────────────────────────────────────────────────
//  ROLE ASSIGNMENT (host only)
// ────────────────────────────────────────────────
async function doAssignRoles(d){
  const shuffled = [...d.players].sort(()=>Math.random()-.5);
  const roles = {};
  let idx = 0;
  const wc = countWolves(shuffled.length);
  const specials = SPECIAL_ROLES.filter(r => d.selectedRoles?.[r]);

  for(let i=0;i<wc&&idx<shuffled.length;i++,idx++) roles[shuffled[idx]] = 'wolf';
  specials.forEach(r => { if(idx<shuffled.length) roles[shuffled[idx++]] = r; });
  while(idx<shuffled.length) roles[shuffled[idx++]] = 'villager';

  // Thief extras
  let thiefOptions = [];
  if(Object.values(roles).includes('thief')) thiefOptions = ['villager','villager'];

  const queue = buildNightQueue({ roles, alive:[...d.players], night:1, selectedRoles:d.selectedRoles||{}, cupidDone:false });

  await updateDoc(ref(), {
    roles, alive:[...d.players], dead:[],
    phase:'night', night:1,
    thiefOptions, cupidDone:false,
    nightQueue: queue, nightStep:0,
    nightActions:{}, nightKill:null,
    guardTarget:null, lastGuardTarget:null,
    witchSaveUsed:false, witchKillUsed:false,
    loverPairs:[], enchanted:[], nightLog:[],
    votes:{}, countdown:null, winState:null,
    messages:[{system:true,text:'🌙 Đêm 1 bắt đầu. Làng chìm vào giấc ngủ...',important:false,ts:Date.now()}]
  });
}

function buildNightQueue(d){
  return NIGHT_ORDER.filter(r => {
    if(r==='wolf')      return d.alive.some(p=>d.roles[p]==='wolf');
    if(r==='whitewolf') return d.alive.some(p=>d.roles[p]==='whitewolf') && d.night%2===0;
    if(r==='cupid')     return d.alive.some(p=>d.roles[p]==='cupid') && d.night===1 && !d.cupidDone;
    if(r==='thief')     return d.alive.some(p=>d.roles[p]==='thief') && d.night===1;
    return d.alive.some(p=>d.roles[p]===r);
  });
}

// ────────────────────────────────────────────────
//  HOST: PROCESS NIGHT
// ────────────────────────────────────────────────
async function processNightAsHost(d){
  const step = d.nightStep;
  const queue = d.nightQueue || [];
  if(step >= queue.length){
    // All night roles done → resolve
    if(d._resolvingNight) return; // guard against double-fire
    await updateDoc(ref(), { _resolvingNight: true });
    await resolveNight(d);
    return;
  }
  // Nothing to do — wait for players to submit actions
}

// ────────────────────────────────────────────────
//  HOST: RESOLVE NIGHT
// ────────────────────────────────────────────────
async function resolveNight(d){
  const updates = {
    phase:'day', _resolvingNight:false,
    nightActions:{}, guardTarget:null
  };
  let nightLog = [...(d.nightLog||[])];
  let alive = [...d.alive];
  let messages = [...(d.messages||[])];
  const addMsg = t => messages.push({system:true,text:t,important:true,ts:Date.now()});

  // Wolf kill
  let killed = d.nightKill;
  if(killed){
    if(killed === d.guardTarget){
      addMsg('🛡️ Bảo vệ đã cứu người bị sói nhắm!');
      nightLog.push('🛡️ ' + killed + ' được bảo vệ');
      killed = null;
    } else if(d.roles[killed] === 'halfwolf'){
      const newRoles = {...d.roles, [killed]:'wolf'};
      addMsg('🐺 ' + killed + ' bị cắn và trở thành sói!');
      nightLog.push('🐺 ' + killed + ' thành sói');
      updates.roles = newRoles;
      alive = alive.filter(p=>p!==killed);  // halfwolf "dies" from being a halfwolf but joins wolf
      killed = null;
    } else {
      nightLog.push('💀 Sói giết ' + killed);
      addMsg('☠️ ' + killed + ' đã chết trong đêm.');
      alive = alive.filter(p=>p!==killed);
      alive = applyLoverDeath(killed, alive, d, nightLog, messages, addMsg);
    }
  }

  // Witch kill
  const wkill = d.nightActions?.witch_kill;
  if(wkill && alive.includes(wkill)){
    nightLog.push('☠️ Phù thủy đầu độc ' + wkill);
    addMsg('☠️ ' + wkill + ' bị phù thủy đầu độc!');
    alive = alive.filter(p=>p!==wkill);
    alive = applyLoverDeath(wkill, alive, d, nightLog, messages, addMsg);
  }

  if(messages.length > 120) messages.splice(0, messages.length-120);

  const dead = d.players.filter(p=>!alive.includes(p));

  if(!killed && !wkill) addMsg('☀️ Không ai chết đêm qua.');
  addMsg('☀️ Bình minh. Thảo luận và bỏ phiếu treo cổ sói!');

  Object.assign(updates, { alive, dead, nightKill:null, nightLog, messages, votes:{} });

  // Check win before saving
  const win = calcWin(alive, d.roles, d.enchanted||[]);
  if(win) updates.winState = win;

  await updateDoc(ref(), updates);
}

function applyLoverDeath(name, alive, d, nightLog, messages, addMsg){
  const pair = (d.loverPairs||[]).find(p=>p.includes(name));
  if(pair){
    const other = pair.find(p=>p!==name);
    if(other && alive.includes(other)){
      alive = alive.filter(p=>p!==other);
      nightLog.push('💕 ' + other + ' chết theo người yêu');
      addMsg('💕 ' + other + ' không chịu đựng được và chết theo người yêu.');
    }
  }
  return alive;
}

// ────────────────────────────────────────────────
//  HOST: PROCESS DAY / VOTE
// ────────────────────────────────────────────────
async function processDayAsHost(d){
  // Wait for host to manually trigger resolve (button)
  // Or auto-resolve when all alive have voted
  if(d._voteResolved) return;
  const alive = d.alive || [];
  if(alive.length === 0) return;

  const totalVotes = Object.keys(d.votes||{}).length;
  // Don't auto-resolve; let host click "Kết thúc bỏ phiếu"
}

window.resolveVote = async () => {
  if(!D || D.host !== myName) return;
  const votes = D.votes || {};
  const counts = {};
  Object.values(votes).forEach(v => counts[v]=(counts[v]||0)+1);
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);

  let messages = [...(D.messages||[])];
  const addMsg = t => messages.push({system:true,text:t,important:true,ts:Date.now()});

  let alive = [...D.alive];
  let nightLog = [...(D.nightLog||[])];
  let winState = null;

  if(sorted.length === 0 || (sorted[1] && sorted[1][1]===sorted[0][1])){
    addMsg('⚖️ Hoà phiếu! Không ai bị treo cổ hôm nay.');
  } else {
    const [top, topCount] = sorted[0];
    addMsg(`☠️ ${top} bị treo cổ! (${topCount}/${Object.keys(votes).length} phiếu)`);
    nightLog.push('🪢 ' + top + ' bị treo cổ');
    alive = alive.filter(p=>p!==top);
    alive = applyLoverDeath(top, alive, D, nightLog, messages, addMsg);

    // Hunter shot
    if(D.roles[top] === 'hunter'){
      const shootTarget = alive[Math.floor(Math.random()*alive.length)];
      if(shootTarget){
        addMsg('🏹 Thợ săn bắn ' + shootTarget + ' trước khi chết!');
        alive = alive.filter(p=>p!==shootTarget);
        alive = applyLoverDeath(shootTarget, alive, D, nightLog, messages, addMsg);
      }
    }
    winState = calcWin(alive, D.roles, D.enchanted||[]);
  }

  if(messages.length > 120) messages.splice(0, messages.length-120);

  const dead = D.players.filter(p=>!alive.includes(p));
  const nextNight = D.night + 1;
  const nextQueue = buildNightQueue({roles:D.roles, alive, night:nextNight, selectedRoles:D.selectedRoles||{}, cupidDone:D.cupidDone});

  const updates = {
    alive, dead, votes:{}, nightLog,
    messages, _voteResolved:false,
    phase: winState ? 'end' : 'night',
    night: winState ? D.night : nextNight,
    nightQueue: nextQueue, nightStep:0,
    nightActions:{}, nightKill:null,
    guardTarget:null, lastGuardTarget:D.guardTarget||null,
  };
  if(winState) updates.winState = winState;
  else {
    messages.push({system:true,text:`🌙 Đêm ${nextNight} bắt đầu...`,important:false,ts:Date.now()});
    updates.messages = messages;
  }

  await updateDoc(ref(), updates);
};

window.skipVote = async () => {
  if(!D) return;
  let messages = [...(D.messages||[])];
  messages.push({system:true,text:'Dân làng quyết định không treo cổ ai.',important:false,ts:Date.now()});
  const nextNight = D.night + 1;
  const nextQueue = buildNightQueue({roles:D.roles, alive:D.alive, night:nextNight, selectedRoles:D.selectedRoles||{}, cupidDone:D.cupidDone});
  await updateDoc(ref(), {
    votes:{}, phase:'night', night:nextNight,
    nightQueue:nextQueue, nightStep:0,
    nightActions:{}, nightKill:null,
    guardTarget:null, lastGuardTarget:D.guardTarget||null,
    messages
  });
};

// ────────────────────────────────────────────────
//  WIN CHECK
// ────────────────────────────────────────────────
function calcWin(alive, roles, enchanted){
  const wolves = alive.filter(p=>roles[p]==='wolf'||roles[p]==='whitewolf');
  const village = alive.filter(p=>roles[p]!=='wolf'&&roles[p]!=='whitewolf'&&roles[p]!=='flutist');
  const ww = alive.filter(p=>roles[p]==='whitewolf');
  const nw = alive.filter(p=>roles[p]==='wolf');
  if(ww.length>0&&nw.length===0&&village.length===0) return {title:'🤍 Sói trắng thắng!',sub:'Sói trắng là kẻ duy nhất còn lại.'};
  if(wolves.length===0) return {title:'🎉 Dân làng thắng!',sub:'Tất cả ma sói đã bị tiêu diệt.'};
  if(wolves.length>=village.length) return {title:'🐺 Ma sói thắng!',sub:'Sói đã ngang bằng hoặc vượt số dân.'};
  const fl = alive.find(p=>roles[p]==='flutist');
  if(fl && alive.every(p=>enchanted.includes(p)||roles[p]==='flutist')) return {title:'🎵 Thổi sáo thắng!',sub:'Mọi người đã bị thôi miên.'};
  return null;
}

// ────────────────────────────────────────────────
//  PLAYER NIGHT ACTIONS
// ────────────────────────────────────────────────
window.nightAction = async (action, target) => {
  if(!D) return;
  const d = D;
  const myRole = d.roles[myName];
  const isAlive = d.alive.includes(myName);
  if(!isAlive) return;

  let updates = {};
  let messages = [...(d.messages||[])];
  const addSys = t => messages.push({system:true,text:t,important:false,ts:Date.now()});

  switch(action){
    case 'wolf_kill':
      updates.nightKill = target;
      addSys('🐺 Sói đã chọn mục tiêu...');
      break;
    case 'guard':
      updates.guardTarget = target;
      updates.lastGuardTarget = d.guardTarget||null;
      addSys('🛡️ Bảo vệ đã chọn người cần che chắn.');
      break;
    case 'seer':{
      const t = d.roles[target];
      addSys(`🔮 [Chỉ bạn thấy] Tiên tri: ${target} là ${ROLES[t]?.name||t}`);
      toast(`👁️ ${target} là ${ROLES[t]?.name||t}`, 5000);
      break;
    }
    case 'witch_save':
      updates.witchSaveUsed = true;
      updates.nightKill = null;
      addSys('🧪 Phù thủy đã cứu người bị giết đêm nay!');
      break;
    case 'witch_kill':{
      updates.witchKillUsed = true;
      const na = {...(d.nightActions||{}), witch_kill: target};
      updates.nightActions = na;
      addSys('☠️ Phù thủy đã bỏ độc ai đó...');
      break;
    }
    case 'cupid':{
      const opts = d.alive.filter(p=>p!==myName);
      const p1=opts[0], p2=opts[1]||opts[0];
      const lp = [...(d.loverPairs||[]),[p1,p2]];
      updates.loverPairs = lp;
      updates.cupidDone = true;
      addSys(`💕 Thần tình yêu ghép đôi ${p1} & ${p2}.`);
      toast(`💕 Bạn đã ghép ${p1} & ${p2}`, 4000);
      break;
    }
    case 'whitewolf_kill':{
      const alive2 = d.alive.filter(p=>p!==target);
      const dead2 = d.players.filter(p=>!alive2.includes(p));
      addSys('🤍 Sói trắng đã hành động trong đêm...');
      updates.alive = alive2;
      updates.dead = dead2;
      break;
    }
    case 'flutist':{
      const enc = [...(d.enchanted||[])];
      if(!enc.includes(target)) enc.push(target);
      updates.enchanted = enc;
      addSys(`🎵 Thổi sáo thôi miên ${target}`);
      break;
    }
    case 'thief':
      updates.roles = {...d.roles, [myName]: target};
      addSys(`🥷 Ăn trộm đã đổi vai mình.`);
      toast(`🥷 Bạn đã trở thành ${ROLES[target]?.name||target}`, 4000);
      break;
    case 'skip':
      addSys('⏭️ Bỏ qua lượt...');
      break;
  }

  if(messages.length > 120) messages.splice(0, messages.length-120);
  updates.messages = messages;

  // Advance nightStep
  updates.nightStep = (d.nightStep||0) + 1;

  await updateDoc(ref(), updates);
};

    nls.style.display = 'block';
    nl.innerHTML = d.nightLog.slice(-12).map(l=>`<div class="night-log-item">${l}</div>`).join('');
  } else nls.style.display = 'none';

  // Chat
  renderChat(d);

  // Actions
  renderActions(d, myRole, isAlive);
}

function renderChat(d){
  const el = document.getElementById('chat-area');
  const msgs = (d.messages||[]).slice(-80);
  el.innerHTML = msgs.map(m => {
    if(m.system) return `<div class="msg system ${m.important?'important':''}">${m.text}</div>`;
    const cls = m.name===myName?'me':'other';
    return `<div class="msg ${cls}"><div class="msg-name">${m.name}</div>${m.text}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderActions(d, myRole, isAlive){
  const el = document.getElementById('action-btns');
  const label = document.getElementById('actions-label');
  el.innerHTML = '';

  if(!isAlive){ label.textContent = '👻 Bạn đã chết — chỉ được xem'; return; }
  if(d.phase === 'end'){ label.textContent = '🏁 Ván kết thúc'; return; }

  if(d.phase === 'night'){
    const queue = d.nightQueue || [];
    const step  = d.nightStep  || 0;
    if(step >= queue.length){ label.textContent = '🌙 Đêm đang kết thúc...'; return; }
    const curRole = queue[step];
    if(myRole !== curRole){ label.textContent = `🌙 Chờ đến lượt... (${ROLES[curRole]?.name||curRole} đang hành động)`; return; }

    label.textContent = `🌙 Lượt của bạn — ${ROLES[curRole]?.name||curRole}`;
    const others = d.alive.filter(p=>p!==myName);

    if(curRole==='wolf'){
      others.filter(p=>d.roles[p]!=='wolf'&&d.roles[p]!=='whitewolf').forEach(p=>{
        el.innerHTML+=`<button class="btn wolf-btn" onclick="nightAction('wolf_kill','${p}')">🐺 Giết ${p}</button>`;
      });
    }
    if(curRole==='seer'){
      others.forEach(p=>{
        el.innerHTML+=`<button class="btn seer-btn" onclick="nightAction('seer','${p}')">🔮 Soi ${p}</button>`;
      });
    }
    if(curRole==='guard'){
      d.alive.filter(p=>p!==d.lastGuardTarget).forEach(p=>{
        el.innerHTML+=`<button class="btn guard-btn" onclick="nightAction('guard','${p}')">🛡️ Bảo vệ ${p}</button>`;
      });
    }
    if(curRole==='witch'){
      if(!d.witchSaveUsed && d.nightKill)
        el.innerHTML+=`<button class="btn witch-btn" onclick="nightAction('witch_save',null)">🧪 Cứu ${d.nightKill}</button>`;
      if(!d.witchKillUsed)
        others.forEach(p=>{ el.innerHTML+=`<button class="btn danger" onclick="nightAction('witch_kill','${p}')">☠️ Độc ${p}</button>`; });
      el.innerHTML+=`<button class="btn" onclick="nightAction('skip',null)">Bỏ qua</button>`;
    }
    if(curRole==='cupid'){
      el.innerHTML+=`<button class="btn gold-btn" onclick="nightAction('cupid',null)">💕 Ghép đôi ngẫu nhiên</button>`;
      el.innerHTML+=`<button class="btn" onclick="nightAction('skip',null)">Bỏ qua</button>`;
    }
    if(curRole==='whitewolf'){
      d.alive.filter(p=>d.roles[p]==='wolf').forEach(p=>{
        el.innerHTML+=`<button class="btn wolf-btn" onclick="nightAction('whitewolf_kill','${p}')">🤍 Giết sói ${p}</button>`;
      });
      el.innerHTML+=`<button class="btn" onclick="nightAction('whitewolf_skip',null)">Bỏ qua</button>`;
    }
    if(curRole==='flutist'){
      others.slice(0,4).forEach(p=>{
        el.innerHTML+=`<button class="btn gold-btn" onclick="nightAction('flutist','${p}')">🎵 Thôi miên ${p}</button>`;
      });
    }
    if(curRole==='thief'){
      (d.thiefOptions||['villager','wolf']).forEach(r=>{
        el.innerHTML+=`<button class="btn" onclick="nightAction('thief','${r}')">🥷 Chọn: ${ROLES[r]?.name||r}</button>`;
      });
    }
    return;
  }

  if(d.phase === 'day'){
    label.textContent = '☀️ Bỏ phiếu — chọn người nghi là sói';
    d.alive.filter(p=>p!==myName).forEach(p=>{
      const voted = d.votes?.[myName]===p;
      el.innerHTML+=`<button class="btn ${voted?'gold':''}" onclick="votePlayer('${p}')">🗳️ Treo ${p}${voted?' ✓':''}</button>`;
    });
    el.innerHTML+=`<button class="btn" onclick="skipVote()">Không treo ai</button>`;
    if(d.host===myName && Object.keys(d.votes||{}).length > 0)
      el.innerHTML+=`<button class="btn danger" onclick="resolveVote()">⚖️ Kết thúc bỏ phiếu</button>`;
  }
}

// ────────────────────────────────────────────────
//  WIN / RESET
// ────────────────────────────────────────────────
function showWin(winState, d){
  document.getElementById('win-title').textContent = winState.title;
  document.getElementById('win-sub').textContent   = winState.sub;
  document.getElementById('win-roles').innerHTML =
    '<div style="font-size:10px;color:var(--muted);font-family:Cinzel,serif;letter-spacing:.1em;margin-bottom:8px">VAI CỦA MỌI NGƯỜI</div>' +
    (d.players||[]).map(p => {
      const alive = d.alive.includes(p);
      return `<div class="win-row" style="${alive?'':'opacity:.45'}">
        <span>${alive?'':'†'} ${p}</span>
        <span class="tag">${ROLES[d.roles?.[p]]?.name||d.roles?.[p]||'?'}</span>
      </div>`;
    }).join('');
  document.getElementById('win-overlay').style.display = 'flex';
}

window.resetGame = async () => {
  document.getElementById('win-overlay').style.display = 'none';
  // Reset room to waiting state
  await updateDoc(ref(), {
    phase:'waiting', winState:null,
    roles:{}, alive:[], dead:[],
    votes:{}, nightLog:[], messages:[],
    ready:{}, countdown:null,
    nightActions:{}, nightQueue:[], nightStep:0
  });
  document.getElementById('game-view').style.display = 'none';
  document.getElementById('lobby-view').style.display = 'flex';
  document.getElementById('lobby-view').querySelector('.lobby-card').style.display = 'none';
  document.getElementById('waiting-card').style.display = 'flex';
  document.getElementById('header-badge').textContent = 'Sảnh chờ';
  document.getElementById('header-badge').classList.remove('active');
  lastPhase = ''; lastNight = 0;
};

// ────────────────────────────────────────────────
//  KEYBOARD
// ────────────────────────────────────────────────
document.getElementById('inp-name').addEventListener('keydown', e => {
  if(e.key==='Enter') document.getElementById('inp-room-id')?.focus() || createRoom();
});
</script>
