<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Feedback Chat</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* decor background */
  .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
  }

  .c1 { width: 250px; height: 250px; background: white; top: 10%; left: 5%; }
  .c2 { width: 300px; height: 300px; background: #ffcc70; bottom: 10%; right: 5%; }
  .c3 { width: 180px; height: 180px; background: #00c9a7; top: 50%; left: 75%; }

  /* chat box */
  .chat-container {
    position: relative;
    z-index: 1;

    width: 90%;
    max-width: 700px;
    height: 80vh;

    display: flex;
    flex-direction: column;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 15px;

    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  /* title */
  h2 {
    position: fixed;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    margin: 0;
  }

  /* bubble */
  .bubble {
    padding: 12px 16px;
    border-radius: 15px;
    margin: 8px 0;
    max-width: 75%;
    animation: fadeIn 0.3s ease;
  }

  .left {
    margin-right: auto;
    background: rgba(255,255,255,0.8);
  }

  .right {
    margin-left: auto;
    background: rgba(0,132,255,0.85);
    color: white;
  }

  .name {
    font-weight: bold;
    margin-bottom: 5px;
  }

  .right .name {
    color: #cce5ff;
  }

  .message {
    font-size: 14px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<!-- nền họa tiết -->
<div class="bg">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
</div>

<h2>💬 Feedback Chat</h2>

<div class="chat-container" id="chat"></div>

<script>
const API = "https://opensheet.elk.sh/1xT9xqRBkRddx9uPv9gNE0WR0M8TcXw14-vtzGQlszrc/About%20us";

async function loadChat() {
  const res = await fetch(API);
  const data = await res.json();

  const chat = document.getElementById("chat");

  data.forEach(row => {
    Object.entries(row).forEach(([name, message]) => {
      if (message && message.trim() !== "") {

        const bubble = document.createElement("div");

        const side = Math.random() > 0.5 ? "left" : "right";
        bubble.className = "bubble " + side;

        bubble.innerHTML = `
          <div class="name">${name}</div>
          <div class="message">${message}</div>
        `;

        chat.appendChild(bubble);
      }
    });
  });
}

loadChat();
</script>

</body>
</html>
